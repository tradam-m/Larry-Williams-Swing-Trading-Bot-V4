name: Controllo Bot Larry Finale

on:
  workflow_dispatch:

jobs:
  run-trading-bot:
    runs-on: self-hosted
    timeout-minutes: 43200 # 30 giorni (massimo consentito spesso è 72h, ma proviamo max)
    steps:
      - name: Scarica i file
        uses: actions/checkout@v4

      # --- BLOCC GPG RIMOSSO (Non necessario e causava errori) ---

      - name: Configura Ambiente e Avvia Bot
        shell: powershell
        env:
          PYTHONUTF8: "1"
        run: |
          # Creiamo il file .env con i nomi esatti che il bot si aspetta
          $content = @(
            "KRAKEN_API_KEY=${{ secrets.KRAKEN_API_KEY }}",
            "KRAKEN_API_SECRET=${{ secrets.KRAKEN_API_SECRET }}",
            "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}",
            "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}",
            "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}",
            "",
            "# Timeframe: 4h riduce il rumore rispetto a 1h",
            "CANDLE_INTERVAL=4h",
            "LOOKBACK_PERIOD=180d",
            "",
            "# Ensemble: filtra i segnali deboli",
            "USE_ENSEMBLE_SYSTEM=true",
            "MIN_ENSEMBLE_CONSENSUS=0.6",
            "MIN_ENSEMBLE_CONFIDENCE=0.6",
            "WEIGHT_SWING=0.30",
            "WEIGHT_MOMENTUM=0.25",
            "WEIGHT_MEAN_REVERSION=0.25",
            "WEIGHT_TREND_FOLLOWING=0.20",
            "",
            "# Coppie attive: solo ETH e BTC (migliori performance storiche)",
            "PAIR_BTC=true",
            "PAIR_ETH=true",
            "PAIR_ADA=false",
            "PAIR_SOL=false",
            "PAIR_XRP=false",
            "",
            "# Risk management migliorato",
            "STOP_LOSS_PCT=4.0",
            "TAKE_PROFIT_PCT=8.0",
            "TRAILING_STOP_PCT=3.0",
            "MIN_PROFIT_FOR_TRAILING=3.0",
            "LEVERAGE=3",
            "MAX_POSITIONS=1",
            "",
            "# Regime e ML",
            "REGIME_LOOKBACK=30",
            "USE_ML_VALIDATION=true",
            "ML_CONFIDENCE_THRESHOLD=0.6",
            "USE_VOLUME_FILTER=true"
          )

          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllLines("$(Get-Location)\.env", $content, $utf8NoBom)

          Write-Host "✅ Ambiente pronto con nomi variabili sincronizzati."

          python -u start_live_simulation.py
      - name: Diagnosi Credenziali
        run: |
          python -c "import os\nfrom dotenv import load_dotenv\nprint(f'Cartella di lavoro: {os.getcwd()}')\ncheck_load = load_dotenv()\nprint(f'Esito load_dotenv: {check_load}')\napi_key = os.getenv('KRAKEN_API_KEY')\napi_secret = os.getenv('KRAKEN_API_SECRET')\nprint(f'KRAKEN_API_KEY trovata: {bool(api_key)}')\nprint(f'KRAKEN_API_SECRET trovata: {bool(api_secret)}')"
